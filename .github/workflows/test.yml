name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx ruff

      - name: Lint with ruff
        run: |
          ruff check backend/ --output-format=github || true
          ruff format --check backend/ || true

      - name: Run backend tests with coverage
        run: |
          python -m pytest backend/tests/ \
            --cov=backend \
            --cov-report=xml:backend-coverage.xml \
            --cov-report=html:htmlcov-backend \
            --cov-report=term-missing \
            --tb=short -q

      - name: Upload backend coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: |
            backend-coverage.xml
            htmlcov-backend/

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint with eslint
        working-directory: frontend
        run: npm run lint || true

      - name: Run frontend tests with coverage
        working-directory: frontend
        run: npx vitest run --coverage

      - name: Upload frontend coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: |
            frontend/coverage/

  build:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Verify build output
        run: |
          test -d frontend/dist && echo "Build successful" || echo "Build failed"
          ls -la frontend/dist/
